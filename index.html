<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlikSnek - Tempahan Pantas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @media print {
            body * { visibility: hidden; }
            #adminSkrin, #adminSkrin * { visibility: visible; }
            #adminSkrin { position: absolute; left: 0; top: 0; width: 100%; padding: 0; box-shadow: none; }
            .no-print { display: none !important; }
            header { display: none !important; }
            body { background-color: white; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <header class="bg-orange-500 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fa-solid fa-cookie-bite mr-2"></i>KlikSnek</h1>
            <button id="btnBakul" onclick="bukaBakul()" class="relative bg-orange-600 hover:bg-orange-700 p-2 rounded-full transition hidden">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
                <span id="badgeBakul" class="absolute -top-1 -right-1 bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        
        <div id="loadingSkrin" class="text-center py-20">
            <i class="fa-solid fa-spinner fa-spin text-5xl text-orange-500 mb-4"></i>
            <p class="text-lg font-semibold text-gray-600">Memuatkan sistem...</p>
        </div>

        <div id="adminSkrin" class="hidden bg-white p-6 rounded-xl shadow-lg w-full">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 border-b pb-4 no-print">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 md:mb-0">
                    <i class="fa-solid fa-user-tie text-red-500 mr-2"></i>Panel Pentadbir
                </h2>
                <div class="space-x-2">
                    <a href="?" class="inline-block bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded shadow">
                        <i class="fa-solid fa-door-open mr-2"></i>Tutup Panel
                    </a>
                </div>
            </div>

            <div class="flex space-x-2 mb-6 border-b no-print overflow-x-auto">
                <button onclick="tukarTabAdmin('tabLaporan')" class="px-4 py-2 font-bold text-orange-600 border-b-4 border-orange-500 focus:outline-none" id="btnTabLaporan">Laporan & Cetak</button>
                <button onclick="tukarTabAdmin('tabBarang')" class="px-4 py-2 font-bold text-gray-500 hover:text-orange-500 focus:outline-none" id="btnTabBarang">Urus Barang</button>
                <button onclick="tukarTabAdmin('tabTetapan')" class="px-4 py-2 font-bold text-gray-500 hover:text-orange-500 focus:outline-none" id="btnTabTetapan">Tetapan Sistem</button>
            </div>

            <div id="tabLaporan" class="tab-kandungan">
                <div class="flex flex-wrap gap-2 mb-4 p-4 bg-gray-50 rounded-lg border no-print">
                    <div class="w-full md:w-auto flex-1">
                        <label class="block text-xs font-bold text-gray-600 mb-1">Cetak Penyata Untuk Pembekal:</label>
                        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow w-full md:w-auto">
                            <i class="fa-solid fa-print mr-2"></i>Cetak Laporan
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-200 text-gray-700 text-sm">
                                <th class="border p-2">Tarikh & Masa</th>
                                <th class="border p-2">Pelanggan</th>
                                <th class="border p-2">Kumpulan</th>
                                <th class="border p-2 w-1/3">Pesanan</th>
                                <th class="border p-2 text-right">Jumlah</th>
                            </tr>
                        </thead>
                        <tbody id="jadualTempahan"></tbody>
                        <tfoot>
                            <tr class="bg-orange-100 font-bold">
                                <td colspan="4" class="border p-3 text-right">JUMLAH KESELURUHAN JUALAN:</td>
                                <td class="border p-3 text-right text-orange-600 text-lg">RM <span id="totalJualanAdmin">0.00</span></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <div id="tabBarang" class="tab-kandungan hidden no-print">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-gray-50 p-4 rounded-lg border shadow-sm">
                        <h3 class="font-bold text-lg mb-4 text-gray-800"><i class="fa-solid fa-plus-circle text-green-500 mr-2"></i>Tambah Barang Jualan</h3>
                        <div class="space-y-3 text-sm">
                            <div><label class="font-bold">Kategori (Cth: Kuih, Kerepek)</label><input type="text" id="tbhKat" class="w-full border p-2 rounded mt-1"></div>
                            <div><label class="font-bold">Nama Barang</label><input type="text" id="tbhNama" class="w-full border p-2 rounded mt-1"></div>
                            <div><label class="font-bold">Saiz / Berat</label><input type="text" id="tbhSaiz" class="w-full border p-2 rounded mt-1"></div>
                            <div><label class="font-bold">Harga (RM)</label><input type="number" id="tbhHarga" class="w-full border p-2 rounded mt-1"></div>
                            <div><label class="font-bold">Link Gambar</label><input type="text" id="tbhGambar" class="w-full border p-2 rounded mt-1" placeholder="https://..."></div>
                            <button onclick="simpanBarang()" class="w-full bg-green-600 text-white font-bold py-2 rounded shadow hover:bg-green-700 mt-2">Simpan Barang</button>
                        </div>
                    </div>

                    <div class="bg-gray-50 p-4 rounded-lg border shadow-sm h-fit">
                        <h3 class="font-bold text-
