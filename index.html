<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlikSnek - Tempahan Pantas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <!-- HEADER -->
    <header class="bg-orange-500 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fa-solid fa-cookie-bite mr-2"></i>KlikSnek</h1>
            <button id="btnBakul" onclick="bukaBakul()" class="relative bg-orange-600 hover:bg-orange-700 p-2 rounded-full transition hidden">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
                <span id="badgeBakul" class="absolute -top-1 -right-1 bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        
        <!-- SKRIN LOADING -->
        <div id="loadingSkrin" class="text-center py-20">
            <i class="fa-solid fa-spinner fa-spin text-5xl text-orange-500 mb-4"></i>
            <p class="text-lg font-semibold text-gray-600">Memuatkan barangan...</p>
        </div>

        <!-- MOD ADMIN -->
        <div id="adminSkrin" class="hidden bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 border-b pb-2"><i class="fa-solid fa-lock text-red-500 mr-2"></i>Panel Pentadbir</h2>
            <p>Paparan data pelanggan dan jumlah jualan akan dibina di sini pada Fasa seterusnya.</p>
        </div>

        <!-- BAHAGIAN KEDAI (Akan terus terpapar) -->
        <div id="kedaiSkrin" class="hidden">
            <div class="mb-6 flex space-x-2 overflow-x-auto py-2" id="kategoriContainer"></div>
            <div id="produkGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>

    </main>

    <!-- MODAL PROFIL (Hanya keluar bila klik tempah kali pertama) -->
    <div id="profilModal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-50 flex items-center justify-center px-4">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
            <h2 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Maklumat Pembeli</h2>
            <p class="text-sm text-gray-600 mb-4">Sila isi maklumat di bawah sebelum meneruskan tempahan.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Penuh</label>
                    <input type="text" id="inputNama" class="mt-1 block w-full rounded-md border-gray-300 border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">No. Telefon (WhatsApp)</label>
                    <input type="tel" id="inputTel" class="mt-1 block w-full rounded-md border-gray-300 border p-2" placeholder="Contoh: 0139100570">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Kumpulan WhatsApp</label>
                    <select id="inputGroup" class="mt-1 block w-full rounded-md border-gray-300 border p-2"></select>
                </div>
                <div class="flex space-x-2">
                    <button onclick="tutupProfilModal()" class="w-1/3 bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">Batal</button>
                    <button onclick="simpanProfil()" class="w-2/3 bg-orange-500 text-white font-bold py-2 px-4 rounded-lg">Sahkan & Teruskan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL BAKUL -->
    <div id="bakulModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-end md:items-center justify-center">
        <div class="bg-white w-full md:w-2/3 lg:w-1/2 md:rounded-xl rounded-t-xl h-[80vh] md:h-auto flex flex-col shadow-2xl" id="bakulContent">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
                <h3 class="text-xl font-bold"><i class="fa-solid fa-basket-shopping mr-2 text-orange-500"></i>Bakul Anda</h3>
                <button onclick="tutupBakul()" class="text-gray-500 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto" id="senaraiBakul"></div>
            <div class="p-4 border-t bg-gray-50">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-lg">Jumlah:</span>
                    <span class="font-bold text-2xl text-orange-600">RM <span id="jumlahKeseluruhan">0</span></span>
                </div>
                <button onclick="hantarTempahan()" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Sahkan & Tempah
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "LETAK_URL_GAS_AWAK_DI_SINI"; // <-- PASTIKAN LETAK URL GAS ANDA SEMULA DI SINI
        const NO_WHATSAPP_ADMIN = "60139100570"; // <-- TUKAR NOMBOR INI JIKA PERLU

        let senaraiProduk = [], senaraiTetapan = [], bakul = [];
        let profilUser = { nama: "", telefon: "", kumpulanWA: "" };
        let itemTertangguh = null; // Menyimpan item jika user belum isi profil

        document.addEventListener("DOMContentLoaded", () => {
            // Pengesan Mod Admin melalui URL (cth: ?admin=rahsia123)
            const urlParams = new URLSearchParams(window.location.search);
            const adminPass = urlParams.get('admin');

            if(adminPass === "rahsia123") {
                document.getElementById("loadingSkrin").classList.add("hidden");
                document.getElementById("adminSkrin").classList.remove("hidden");
                // Skrip tarik data admin akan ditambah kemudian
                return; 
            }

            // Jika bukan admin, muatkan kedai biasa
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    senaraiProduk = data.produk;
                    senaraiTetapan = data.tetapan;
                    
                    const selectGroup = document.getElementById("inputGroup");
                    selectGroup.innerHTML = '<option value="">-- Sila Pilih --</option>';
                    senaraiTetapan.forEach(t => { if(t.JenisGroupWA) selectGroup.add(new Option(t.JenisGroupWA, t.JenisGroupWA)); });
                    selectGroup.add(new Option("Lain-lain", "Lain-lain"));

                    document.getElementById("loadingSkrin").classList.add("hidden");
                    document.getElementById("kedaiSkrin").classList.remove("hidden");
                    document.getElementById("btnBakul").classList.remove("hidden");
                    paparKategori();
                });
        });

        function paparKategori() {
            const kategoriUnik = [...new Set(senaraiProduk.map(item => item.Kategori))];
            const container = document.getElementById("kategoriContainer");
            container.innerHTML = ""; 
            kategoriUnik.forEach(kat => {
                let btn = document.createElement("button");
                btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-orange-500 text-orange-600 font-medium hover:bg-orange-500 hover:text-white";
                btn.innerText = kat;
                btn.onclick = () => paparProduk(kat);
                container.appendChild(btn);
            });
            if(kategoriUnik.length > 0) paparProduk(kategoriUnik[0]);
        }

        function paparProduk(kategoriDipilih) {
            const grid = document.getElementById("produkGrid");
            grid.innerHTML = ""; 
            senaraiProduk.filter(item => item.Kategori === kategoriDipilih).forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-white rounded-xl shadow-md overflow-hidden flex flex-col";
                card.innerHTML = `
                    <div class="h-40 bg-gray-200 relative">
                        <img src="${item.Gambar}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3 flex-1 flex flex-col">
                        <h3 class="font-bold text-gray-800 text-sm mb-1">${item.NamaBarang}</h3>
                        <p class="text-xs text-gray-500 mb-1">${item.Saiz}</p>
                        <p class="font-bold text-orange-600 mb-2">RM ${item.Harga}</p>
                        <button onclick='klikTempah(${JSON.stringify(item)})' class="mt-auto w-full bg-orange-100 text-orange-600 border border-orange-500 font-bold py-1.5 rounded-lg hover:bg-orange-500 hover:text-white transition">Tempah</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Fungsi baharu: Semak jika profil dah isi sebelum masuk bakul
        function klikTempah(item) {
            if(!profilUser.nama) {
                itemTertangguh = item;
                document.getElementById("profilModal").classList.remove("hidden");
            } else {
                tanyaKuantiti(item);
            }
        }

        function tutupProfilModal() {
            document.getElementById("profilModal").classList.add("hidden");
            itemTertangguh = null;
        }

        function simpanProfil() {
            const n = document.getElementById("inputNama").value.trim();
            const t = document.getElementById("inputTel").value.trim();
            const g = document.getElementById("inputGroup").value;

            if(!n || !t || !g) {
                Swal.fire("Maaf", "Sila isi semua maklumat.", "warning"); return;
            }
            profilUser = { nama: n, telefon: t, kumpulanWA: g };
            tutupProfilModal();
            if(itemTertangguh) {
                tanyaKuantiti(itemTertangguh);
                itemTertangguh = null;
            }
        }

        function tanyaKuantiti(item) {
            Swal.fire({
                title: item.NamaBarang,
                text: `${item.Saiz} - RM ${item.Harga}`,
                input: 'number',
                inputValue: 1,
                inputAttributes: { min: 1 },
                showCancelButton: true,
                confirmButtonText: 'Masuk Bakul',
                confirmButtonColor: '#f97316'
            }).then((res) => {
                if (res.isConfirmed && res.value > 0) tambahKeBakul(item, parseInt(res.value));
            });
        }

        function tambahKeBakul(item, kuantiti) {
            const jumlah = parseFloat(item.Harga) * kuantiti;
            const sediaAda = bakul.findIndex(b => b.nama === item.NamaBarang && b.saiz === item.Saiz);
            
            if (sediaAda > -1) {
                bakul[sediaAda].kuantiti += kuantiti;
                bakul[sediaAda].jumlah += jumlah;
            } else {
                bakul.push({ nama: item.NamaBarang, saiz: item.Saiz, hargaSatu: item.Harga, kuantiti: kuantiti, jumlah: jumlah });
            }
            document.getElementById("badgeBakul").innerText = bakul.reduce((total, item) => total + item.kuantiti, 0);
            Swal.fire({icon: 'success', title: 'Dimasukkan!', timer: 1000, showConfirmButton: false});
        }

        function bukaBakul() {
            if(bakul.length===0){ Swal.fire("Bakul Kosong", "", "info"); return; }
            document.getElementById("bakulModal").classList.remove("hidden");
            const container = document.getElementById("senaraiBakul");
            container.innerHTML = "";
            let total = 0;
            bakul.forEach((item, i) => {
                total += item.jumlah;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-3 border mb-2 rounded">
                        <div><h4 class="font-bold text-sm">${item.nama}</h4><p class="text-xs text-gray-500">${item.saiz} | RM ${item.hargaSatu} x ${item.kuantiti}</p></div>
                        <div class="flex items-center space-x-4"><span class="font-bold text-orange-600">RM ${item.jumlah.toFixed(2)}</span><button onclick="bakul.splice(${i},1); bukaBakul();" class="text-red-500"><i class="fa-solid fa-trash"></i></button></div>
                    </div>`;
            });
            document.getElementById("jumlahKeseluruhan").innerText = total.toFixed(2);
            document.getElementById("badgeBakul").innerText = bakul.reduce((t, item) => t + item.kuantiti, 0);
            if(bakul.length===0) tutupBakul();
        }

        function tutupBakul() { document.getElementById("bakulModal").classList.add("hidden"); }

        function hantarTempahan() {
            const total = bakul.reduce((t, item) => t + item.jumlah, 0);
            const data = { nama: profilUser.nama, telefon: profilUser.telefon, kumpulanWA: profilUser.kumpulanWA, bakul: bakul, jumlahKeseluruhan: total };

            Swal.fire({ title: 'Memproses...', didOpen: () => { Swal.showLoading(); } });

            fetch(API_URL, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'text/plain;charset=utf-8' } })
            .then(res => res.json())
            .then(respon => {
                if(respon.status === "berjaya") {
                    let teksWA = `*TEMPAHAN BARU KLICKSNEK* 🍪\nID: ${respon.id}\n\n*Nama:* ${profilUser.nama}\n*Tel:* ${profilUser.telefon}\n*Kumpulan:* ${profilUser.kumpulanWA}\n\n*Pesanan:*\n`;
                    bakul.forEach(i => teksWA += `- ${i.nama} (${i.saiz}) x${i.kuantiti} = RM${i.jumlah}\n`);
                    teksWA += `\n*Jumlah: RM ${total}*\nSila sahkan tempahan saya.`;
                    
                    Swal.fire('Berjaya!', 'Tempahan direkod.', 'success').then(() => {
                        bakul = []; bukaBakul(); window.open(`https://wa.me/${NO_WHATSAPP_ADMIN}?text=${encodeURIComponent(teksWA)}`, '_blank');
                    });
                }
            });
        }
    </script>
</body>
</html>
